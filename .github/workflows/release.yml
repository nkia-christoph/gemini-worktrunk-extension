name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create archive
        run: tar -czvf worktrunk.tar.gz gemini-extension.json GEMINI.md README.md hooks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: worktrunk.tar.gz
